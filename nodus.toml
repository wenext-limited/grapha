content_roots = ["nodus"]
[mcp_servers.grapha]
command = "grapha"
args = ["serve", "--mcp", "--watch", "-p", "."]

[adapters]
enabled = ["claude", "codex"]
[launch_hooks]
sync_on_startup = true
[dev-dependencies]
codex_plugin_cc = { github = "openai/codex-plugin-cc", tag = "v1.0.2", members = ["codex"] }
superpowers = { github = "obra/superpowers", branch = "main" }
